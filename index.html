    function showScreen(id){screens.forEach(s=>$(s).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}function randomItem(a){return a[Math.floor(Math.random()*a.length)]}function localize(v){return typeof v==="string"?v:(v[currentLanguage]||v.en||v.uk||"")}function escapeHTML(x){return String(x).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function createQuestionPairFromTemplate(tm){return{normal:localize(tm.normal),impostor:localize(tm.impostor),topic:tm.topic,topicLabel:localize(tm.topicLabel),language:currentLanguage}}function generateQuestionPair(){return createQuestionPairFromTemplate(randomItem(questionTemplates))}function createLobbyCode(){return Math.random().toString(36).substring(2,6).toUpperCase()}function getPlayersArray(l=currentLobbyData){return Object.entries(l?.players||{}).map(([id,p])=>({id,...p}))}function isHost(l=currentLobbyData){return Boolean(l&&currentPlayerId&&l.hostId===currentPlayerId)}function getMyPlayer(l=currentLobbyData){return l?.players?.[currentPlayerId]||null}function loadHistory(){try{return JSON.parse(localStorage.getItem("impostorGameHistory"))||[]}catch{return[]}}function saveHistory(){localStorage.setItem("impostorGameHistory",JSON.stringify(history))}

    function renderPlayers(){const list=$("playersList"),players=getPlayersArray();list.innerHTML=`<div class="player-card"><strong>${escapeHTML(t("playersInLobby"))}</strong><p>${escapeHTML(players.length?String(players.length):t("noLobbyPlayers"))}</p></div>`;players.forEach(p=>{const card=document.createElement("div");card.className="player-card";const badges=[];if(p.id===currentPlayerId)badges.push(t("youLabel"));if(currentLobbyData?.hostId===p.id)badges.push(t("hostLabel"));card.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${escapeHTML(badges.join(" · "))}</p>`;if(isHost()&&p.id!==currentPlayerId){const b=document.createElement("button");b.className="danger";b.style.marginTop="10px";b.textContent=t("removePlayerBtn");b.addEventListener("click",()=>removePlayer(p.id));card.appendChild(b)}list.appendChild(card)});const inLobby=Boolean(currentLobbyCode&&currentLobbyData&&getMyPlayer());$("createLobbyBtn").classList.toggle("hidden",inLobby);$("leaveLobbyBtn").classList.toggle("hidden",!inLobby);$("startBtn").classList.toggle("hidden",!isHost()||currentLobbyData?.phase!=="lobby");$("deleteLobbyBtn").classList.toggle("hidden",!isHost())}

    function saveFinishedRound(lobby,res){if(history.some(x=>x.roundStartedAt===lobby.roundStartedAt))return;const ps=getPlayersArray(lobby),imp=ps.find(p=>p.id===lobby.impostorId),out=ps.find(p=>p.id===res.votedOutId);history.push({date:new Date().toLocaleString([], {year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}),roundStartedAt:lobby.roundStartedAt,topicLabel:lobby.topicLabel,normalQuestion:lobby.regularQuestion,impostorQuestion:lobby.impostorQuestion,impostorName:imp?.name||"—",votedName:out?.name||"—",guessedCorrectly:res.impostorCaught});saveHistory();renderHistory()}
    async function rerollQuestions(){if(!currentLobbyCode||!isHost())return;const p=generateQuestionPair();await update(ref(db,`lobbies/${currentLobbyCode}`),{topic:p.topic,topicLabel:p.topicLabel,regularQuestion:p.normal,impostorQuestion:p.impostor})}function renderHistory(){const l=$("historyList");l.innerHTML="";if(!history.length){l.innerHTML=`<div class="history-card"><p>${escapeHTML(t("emptyHistory"))}</p></div>`;return}history.slice().reverse().forEach((r,i)=>{const c=document.createElement("div");c.className="history-card";c.innerHTML=`<strong>${escapeHTML(t("gameWord"))} ${history.length-i}</strong><div class="meta">${escapeHTML(r.date)} · ${escapeHTML(r.topicLabel||t("unknownTopic"))}</div><p><strong>${escapeHTML(t("regularQuestionLabel"))}:</strong> ${escapeHTML(r.normalQuestion)}</p><p><strong>${escapeHTML(t("impostorQuestionLabel"))}:</strong> ${escapeHTML(r.impostorQuestion)}</p><p><strong>${escapeHTML(t("impostorLabel"))}:</strong> ${escapeHTML(r.impostorName)}</p><p><strong>${escapeHTML(t("voteWord"))}:</strong> ${escapeHTML(r.votedName)} ${r.guessedCorrectly?"✅ "+escapeHTML(t("correctWord")):"❌ "+escapeHTML(t("wrongWord"))}</p>`;l.appendChild(c)})}function clearHistory(){if(confirm(t("clearHistoryConfirm"))){history=[];localStorage.removeItem("impostorGameHistory");renderHistory()}}
    function bind(id,event,fn){const el=$(id);if(el)el.addEventListener(event,fn);else console.warn("Missing element",id)}bind("createLobbyBtn","click",createLobby);bind("joinLobbyBtn","click",joinLobby);bind("startBtn","click",startOnlineRound);bind("changeNameBtn","click",showNameModal);bind("saveNameBtn","click",saveName);bind("nameInput","keydown",e=>{if(e.key==="Enter")saveName()});bind("saveAnswerBtn","click",submitAnswer);bind("rerollQuestionsBtn","click",rerollQuestions);bind("goVoteBtn","click",startVoting);bind("playAgainBtn","click",startOnlineRound);bind("backSetupBtn","click",()=>showScreen("setupScreen"));bind("clearHistoryBtn","click",clearHistory);bind("deleteLobbyBtn","click",deleteLobby);bind("leaveLobbyBtn","click",leaveLobby);bind("closeStatusModalBtn","click",closeStatusModal);["hostReturnLobbyFromQuestionsBtn","hostReturnLobbyFromAnswersBtn","hostReturnLobbyFromVotingBtn","hostReturnLobbyFromResultsBtn"].forEach(id=>bind(id,"click",returnToLobby));document.querySelectorAll(".lang-btn").forEach(btn=>btn.addEventListener("click",()=>applyLanguage(btn.dataset.lang)));
    applyLanguage(currentLanguage);renderMyName();renderHistory();showNameModal();if(currentLobbyCode)listenToLobby(currentLobbyCode);console.log("Find the Impostor loaded");
  </script>
