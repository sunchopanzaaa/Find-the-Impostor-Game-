['battery','Телефон','На якому відсотку батареї ти вже починаєш нервувати? Напиши відповідь у відсотках.','Який відсоток батареї вже виглядає критично низьким? Напиши відповідь у відсотках.','Phone','At what battery percentage do you start getting nervous? Write your answer in percentages.','What battery percentage already feels critically low? Write your answer in percentages.'],
['late','Запізнення','На скільки хвилин можна запізнитися без драми?','Після якого запізнення люди вже починають злитися? Напиши відповідь у хвилинах.','Being late','How many minutes late can you be without drama?','After what delay do people start getting annoyed? Write your answer in minutes.'],
['stories','Instagram','Скільки сторіс за день — це вже забагато?','Після якої кількості сторіс здається, що людина документує кожен свій рух?','Instagram','How many stories per day is too many?','After how many stories does it feel like someone documents every move?'],
['delivery','Доставка','Скільки разів на тиждень нормально замовляти доставку?','Після якої кількості замовлень доставка вже виглядає як залежність?','Delivery','How many times per week is it normal to order delivery?','After how many deliveries does it start looking like an addiction?'],
['chat','Чати','Після якої кількості людей у груповому чаті там уже починається хаос?','Скільки людей у чаті — це вже занадто, щоб нормально читати повідомлення?','Chats','After how many people does a group chat become chaotic?','How many people in a chat is too many to comfortably read messages?']];
    const questionTemplates=[...coreQuestions,...Array.from({length:90},(_,i)=>{const p=more[i%more.length];return q(p[0]+i,p[1],p[2],p[3],p[4],p[5],p[6])})];
    let currentLanguage=localStorage.getItem('impostorGameLanguage')||'uk';let myPlayerName=localStorage.getItem('impostorPlayerName')||'';let currentLobbyCode=localStorage.getItem('impostorLobbyCode')||null;let currentPlayerId=localStorage.getItem('impostorPlayerId')||null;let currentLobbyData=null;let history=loadHistory();let unsubscribeLobby=null;
    const $=id=>document.getElementById(id);const screens=['setupScreen','questionScreen','answersScreen','voteScreen','resultScreen'];const t=k=>translations[currentLanguage][k]||translations.en[k]||k;function showScreen(id){screens.forEach(s=>$(s).classList.add('hidden'));$(id).classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}function randomItem(a){return a[Math.floor(Math.random()*a.length)]}function localize(v){return typeof v==='string'?v:(v[currentLanguage]||v.en||v.uk||'')}function escapeHTML(x){return String(x).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function makeQuestionPair(tm){return{normal:localize(tm.normal),impostor:localize(tm.impostor),topic:tm.topic,topicLabel:localize(tm.topicLabel),language:currentLanguage}}
    function generateQuestionPair(){return makeQuestionPair(randomItem(questionTemplates))}
    function generateUnusedQuestionPair(lobby=currentLobbyData){let used=Array.isArray(lobby?.usedQuestionKeys)?[...lobby.usedQuestionKeys]:[];let available=questionTemplates.filter(q=>!used.includes(q.topic));if(!available.length){used=[];available=[...questionTemplates]}const template=randomItem(available);const pair=makeQuestionPair(template);return{pair,usedQuestionKeys:[...used,template.topic]}}function createLobbyCode(){return Math.random().toString(36).substring(2,6).toUpperCase()}function getPlayersArray(l=currentLobbyData){return Object.entries(l?.players||{}).map(([id,p])=>({id,...p}))}function isHost(l=currentLobbyData){return Boolean(l&&currentPlayerId&&l.hostId===currentPlayerId)}function getMyPlayer(l=currentLobbyData){return l?.players?.[currentPlayerId]||null}function loadHistory(){try{return JSON.parse(localStorage.getItem('impostorGameHistory'))||[]}catch{return[]}}function saveHistory(){localStorage.setItem('impostorGameHistory',JSON.stringify(history))}
    function applyLanguage(lang){currentLanguage=lang;localStorage.setItem('impostorGameLanguage',lang);document.documentElement.lang=lang;document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-placeholder-key]').forEach(el=>el.placeholder=t(el.dataset.placeholderKey));document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang));renderMyName();renderPlayers();renderHistory();renderLobbyByPhase()}function renderMyName(){$('myNameText').textContent=myPlayerName||'—'}function showNameModal(){$('nameModal').classList.remove('hidden');$('nameInput').value=myPlayerName;setTimeout(()=>$('nameInput').focus(),50)}async function saveName(){const n=$('nameInput').value.trim();if(!n)return;myPlayerName=n;localStorage.setItem('impostorPlayerName',n);$('nameModal').classList.add('hidden');renderMyName();if(currentLobbyCode&&currentPlayerId){const snap=await get(child(ref(db),`lobbies/${currentLobbyCode}/players/${currentPlayerId}`));if(snap.exists())await update(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),{name:n})}}
    async function createLobby(){if(!myPlayerName){alert(t('needNameAlert'));showNameModal();return}const code=createLobbyCode(),pid=crypto.randomUUID();await set(ref(db,`lobbies/${code}`),{phase:'lobby',hostId:pid,createdAt:Date.now(),language:currentLanguage,players:{[pid]:{name:myPlayerName,answer:'',vote:'',connected:true}}});currentLobbyCode=code;currentPlayerId=pid;localStorage.setItem('impostorLobbyCode',code);localStorage.setItem('impostorPlayerId',pid);listenToLobby(code)}async function joinLobby(){if(!myPlayerName){alert(t('needNameAlert'));showNameModal();return}const code=$('lobbyCodeInput').value.trim().toUpperCase();if(!code)return;const snap=await get(child(ref(db),`lobbies/${code}`));if(!snap.exists()){alert(t('lobbyNotFound'));return}const lobby=snap.val();let pid=currentLobbyCode===code&&currentPlayerId&&lobby.players?.[currentPlayerId]?currentPlayerId:null;if(!pid){const ex=Object.entries(lobby.players||{}).find(([id,p])=>p.name===myPlayerName);pid=ex?ex[0]:crypto.randomUUID()}await update(ref(db,`lobbies/${code}/players/${pid}`),{name:myPlayerName,answer:'',vote:'',connected:true});currentLobbyCode=code;currentPlayerId=pid;localStorage.setItem('impostorLobbyCode',code);localStorage.setItem('impostorPlayerId',pid);listenToLobby(code)}
    function listenToLobby(code){if(unsubscribeLobby)unsubscribeLobby();unsubscribeLobby=onValue(ref(db,`lobbies/${code}`),snap=>{const lobby=snap.val();if(!lobby){currentLobbyData=null;currentLobbyCode=null;currentPlayerId=null;localStorage.removeItem('impostorLobbyCode');localStorage.removeItem('impostorPlayerId');$('currentLobbyCode').textContent='—';renderPlayers();showScreen('setupScreen');return}currentLobbyData=lobby;$('currentLobbyCode').textContent=code;renderPlayers();renderLobbyByPhase();maybeAutoAdvance(code,lobby)})}function renderPlayers(){const list=$('playersList'),players=getPlayersArray();list.innerHTML=`<div class="player-card"><strong>${escapeHTML(t('playersInLobby'))}</strong><p>${escapeHTML(players.length?String(players.length):t('noLobbyPlayers'))}</p></div>`;players.forEach(p=>{const c=document.createElement('div');c.className='player-card';const badges=[];if(p.id===currentPlayerId)badges.push(t('youLabel'));if(currentLobbyData?.hostId===p.id)badges.push(t('hostLabel'));c.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${escapeHTML(badges.join(' · '))}</p>`;if(isHost()&&p.id!==currentPlayerId){const b=document.createElement('button');b.className='danger';b.style.marginTop='10px';b.textContent=t('removePlayerBtn');b.onclick=()=>removePlayer(p.id);c.appendChild(b)}list.appendChild(c)});const inLobby=Boolean(currentLobbyCode&&currentLobbyData&&getMyPlayer());$('createLobbyBtn').classList.toggle('hidden',inLobby);$('leaveLobbyBtn').classList.toggle('hidden',!inLobby);$('startBtn').classList.toggle('hidden',!isHost()||currentLobbyData?.phase!=='lobby');$('deleteLobbyBtn').classList.toggle('hidden',!isHost())}function renderLobbyByPhase(){if(!currentLobbyData){showScreen('setupScreen');return}if(currentLobbyData.phase==='questions')renderQuestionPhase();else if(currentLobbyData.phase==='answers')renderAnswersPhase();else if(currentLobbyData.phase==='voting')renderVotingPhase();else if(currentLobbyData.phase==='results')renderResultsPhase();else showScreen('setupScreen')}
    async function leaveLobby(){if(!currentLobbyCode||!currentPlayerId)return;if(!confirm(t('leaveLobbyConfirm')))return;await set(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),null);currentLobbyCode=null;currentPlayerId=null;currentLobbyData=null;localStorage.removeItem('impostorLobbyCode');localStorage.removeItem('impostorPlayerId');$('currentLobbyCode').textContent='—';renderPlayers();showScreen('setupScreen')}async function removePlayer(id){if(currentLobbyCode&&isHost()&&confirm(t('removePlayerConfirm')))await set(ref(db,`lobbies/${currentLobbyCode}/players/${id}`),null)}async function deleteLobby(){if(currentLobbyCode&&isHost()&&confirm(t('deleteLobbyConfirm')))await set(ref(db,`lobbies/${currentLobbyCode}`),null)}async function returnToLobby(){if(!currentLobbyCode||!currentLobbyData||!isHost())return;if(!confirm(t('hostReturnLobbyConfirm')))return;const up={phase:'lobby',topic:null,topicLabel:null,regularQuestion:null,impostorQuestion:null,impostorId:null,results:null,roundStartedAt:null};getPlayersArray().forEach(p=>{up[`players/${p.id}/answer`]='';up[`players/${p.id}/vote`]=''});await update(ref(db,`lobbies/${currentLobbyCode}`),up);currentLobbyData={...currentLobbyData,phase:'lobby',topic:null,topicLabel:null,regularQuestion:null,impostorQuestion:null,impostorId:null,results:null,roundStartedAt:null};getPlayersArray().forEach(p=>{if(currentLobbyData.players?.[p.id]){currentLobbyData.players[p.id].answer='';currentLobbyData.players[p.id].vote='';}});renderPlayers();showScreen('setupScreen')}function showStatusModal(msg){$('statusModalText').textContent=msg;$('statusModal').classList.remove('hidden')}function closeStatusModal(){$('statusModal').classList.add('hidden')}
    async function startOnlineRound(){if(!currentLobbyCode||!currentLobbyData)return;const players=getPlayersArray();if(players.length<3){alert(t('minPlayersAlert'));return}const generated=generateUnusedQuestionPair(currentLobbyData),pair=generated.pair,imp=randomItem(players);const up={phase:'questions',language:currentLanguage,topic:pair.topic,topicLabel:pair.topicLabel,regularQuestion:pair.normal,impostorQuestion:pair.impostor,impostorId:imp.id,results:null,roundStartedAt:Date.now(),usedQuestionKeys:generated.usedQuestionKeys};players.forEach(p=>{up[`players/${p.id}/answer`]='';up[`players/${p.id}/vote`]=''});await update(ref(db,`lobbies/${currentLobbyCode}`),up)}function getMyQuestion(){return currentPlayerId===currentLobbyData.impostorId?currentLobbyData.impostorQuestion:currentLobbyData.regularQuestion}function renderQuestionPhase(){const me=getMyPlayer();if(!me){showScreen('setupScreen');return}$('questionPlayerName').textContent=me.name;$('questionText').textContent=getMyQuestion();$('answerInput').value=me.answer||'';$('answerInput').disabled=Boolean(me.answer);$('saveAnswerBtn').disabled=Boolean(me.answer);$('answerStatusText').textContent=me.answer?t('answerSaved'):t('waitingAnswers');$('rerollQuestionsBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromQuestionsBtn').classList.toggle('hidden',!isHost());showScreen('questionScreen')}async function submitAnswer(){const ans=$('answerInput').value.trim();if(!ans){alert(t('emptyAnswerAlert'));return}await update(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),{answer:ans});showStatusModal(t('answerSaved'))}
    function renderAnswersPhase(){const list=$('answersList');list.innerHTML='';getPlayersArray().forEach(p=>{const c=document.createElement('div');c.className='answer-card';c.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${escapeHTML(p.answer||'—')}</p>`;list.appendChild(c)});$('goVoteBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromAnswersBtn').classList.toggle('hidden',!isHost());showScreen('answersScreen')}async function startVoting(){await update(ref(db,`lobbies/${currentLobbyCode}`),{phase:'voting'})}function renderVotingPhase(){const grid=$('voteGrid'),me=getMyPlayer();grid.innerHTML='';getPlayersArray().forEach(p=>{const b=document.createElement('button');b.className='vote-btn';b.innerHTML=`<strong>${escapeHTML(p.name)}</strong><span style="display:block;margin-top:5px;font-size:12px;font-weight:500;color:var(--muted);line-height:1.35;">${escapeHTML(p.answer||'—')}</span>`;b.disabled=Boolean(me?.vote)||p.id===currentPlayerId;b.onclick=()=>submitVote(p.id);grid.appendChild(b)});$('voteStatusText').textContent=me?.vote?t('voteSaved'):'';$('hostReturnLobbyFromVotingBtn').classList.toggle('hidden',!isHost());showScreen('voteScreen')}async function submitVote(id){if(getMyPlayer()?.vote){alert(t('alreadyVoted'));return}await update(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),{vote:id})}
    async function maybeAutoAdvance(code,lobby){if(!isHost(lobby))return;const players=getPlayersArray(lobby);if(players.length<3)return;if(lobby.phase==='questions'&&players.every(p=>p.answer))await update(ref(db,`lobbies/${code}`),{phase:'answers'});if(lobby.phase==='voting'&&players.every(p=>p.vote)){const res=calculateResults(lobby);await update(ref(db,`lobbies/${code}`),{phase:'results',results:res});saveFinishedRound(lobby,res)}}function calculateResults(lobby){const players=getPlayersArray(lobby),counts={};players.forEach(p=>{if(p.vote)counts[p.vote]=(counts[p.vote]||0)+1});let votedOutId=null,max=-1;Object.entries(counts).forEach(([id,c])=>{if(c>max){votedOutId=id;max=c}});return{voteCounts:counts,votedOutId,impostorCaught:votedOutId===lobby.impostorId}}
    function renderResultsPhase(){const l=currentLobbyData,res=l.results||calculateResults(l),players=getPlayersArray(l),imp=players.find(p=>p.id===l.impostorId),out=players.find(p=>p.id===res.votedOutId);$('resultEmoji').textContent=res.impostorCaught?'🎯':'😎';$('resultTitle').textContent=res.impostorCaught?t('foundTitle'):t('escapedTitle');$('resultText').textContent=res.impostorCaught?t('foundText')(out?.name||'—'):t('escapedText')(out?.name||t('noVotesLabel'),imp?.name||'—');$('revealQuestions').innerHTML=`<div class="answer-card"><strong>${escapeHTML(t('topicLabel'))}</strong><p>${escapeHTML(l.topicLabel||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(t('regularQuestionLabel'))}</strong><p>${escapeHTML(l.regularQuestion||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(t('impostorQuestionLabel'))}</strong><p>${escapeHTML(l.impostorQuestion||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(t('impostorLabel'))}</strong><p>${escapeHTML(imp?.name||'—')} — ${escapeHTML(t('answerWord'))}: ${escapeHTML(imp?.answer||'—')}</p></div>`;const vl=$('voteResultsList');vl.innerHTML=`<div class="answer-card"><strong>${escapeHTML(t('votesLabel'))}</strong><p></p></div>`;players.forEach(p=>{const c=document.createElement('div');c.className='answer-card';c.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${res.voteCounts?.[p.id]||0}</p>`;vl.appendChild(c)});$('playAgainBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromResultsBtn').classList.toggle('hidden',!isHost());showScreen('resultScreen')}function saveFinishedRound(lobby,res){if(history.some(x=>x.roundStartedAt===lobby.roundStartedAt))return;const ps=getPlayersArray(lobby),imp=ps.find(p=>p.id===lobby.impostorId),out=ps.find(p=>p.id===res.votedOutId);history.push({date:new Date().toLocaleString([], {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),roundStartedAt:lobby.roundStartedAt,topicLabel:lobby.topicLabel,normalQuestion:lobby.regularQuestion,impostorQuestion:lobby.impostorQuestion,impostorName:imp?.name||'—',votedName:out?.name||'—',guessedCorrectly:res.impostorCaught});saveHistory();renderHistory()}
    async function rerollQuestions(){if(!currentLobbyCode||!isHost())return;const generated=generateUnusedQuestionPair(currentLobbyData),p=generated.pair;await update(ref(db,`lobbies/${currentLobbyCode}`),{topic:p.topic,topicLabel:p.topicLabel,regularQuestion:p.normal,impostorQuestion:p.impostor,usedQuestionKeys:generated.usedQuestionKeys})}function renderHistory(){const l=$('historyList');l.innerHTML='';if(!history.length){l.innerHTML=`<div class="history-card"><p>${escapeHTML(t('emptyHistory'))}</p></div>`;return}history.slice().reverse().forEach((r,i)=>{const c=document.createElement('div');c.className='history-card';c.innerHTML=`<strong>${escapeHTML(t('gameWord'))} ${history.length-i}</strong><div class="meta">${escapeHTML(r.date)} · ${escapeHTML(r.topicLabel||t('unknownTopic'))}</div><p><strong>${escapeHTML(t('regularQuestionLabel'))}:</strong> ${escapeHTML(r.normalQuestion)}</p><p><strong>${escapeHTML(t('impostorQuestionLabel'))}:</strong> ${escapeHTML(r.impostorQuestion)}</p><p><strong>${escapeHTML(t('impostorLabel'))}:</strong> ${escapeHTML(r.impostorName)}</p><p><strong>${escapeHTML(t('voteWord'))}:</strong> ${escapeHTML(r.votedName)} ${r.guessedCorrectly?'✅ '+escapeHTML(t('correctWord')):'❌ '+escapeHTML(t('wrongWord'))}</p>`;l.appendChild(c)})}function clearHistory(){if(confirm(t('clearHistoryConfirm'))){history=[];localStorage.removeItem('impostorGameHistory');renderHistory()}}
    function bind(id,event,fn){const el=$(id);if(el)el.addEventListener(event,fn);else console.warn('Missing element',id)}bind('createLobbyBtn','click',createLobby);bind('leaveLobbyBtn','click',leaveLobby);bind('joinLobbyBtn','click',joinLobby);bind('startBtn','click',startOnlineRound);bind('changeNameBtn','click',showNameModal);bind('saveNameBtn','click',saveName);bind('nameInput','keydown',e=>{if(e.key==='Enter')saveName()});bind('saveAnswerBtn','click',submitAnswer);bind('rerollQuestionsBtn','click',rerollQuestions);bind('goVoteBtn','click',startVoting);bind('playAgainBtn','click',startOnlineRound);bind('backSetupBtn','click',()=>showScreen('setupScreen'));bind('clearHistoryBtn','click',clearHistory);bind('deleteLobbyBtn','click',deleteLobby);bind('closeStatusModalBtn','click',closeStatusModal);['hostReturnLobbyFromQuestionsBtn','hostReturnLobbyFromAnswersBtn','hostReturnLobbyFromVotingBtn','hostReturnLobbyFromResultsBtn'].forEach(id=>bind(id,'click',returnToLobby));document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>applyLanguage(btn.dataset.lang)));
    applyLanguage(currentLanguage);renderMyName();renderHistory();showNameModal();if(currentLobbyCode)listenToLobby(currentLobbyCode);console.log('Find the Impostor loaded');
