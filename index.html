    function renderAnswersPhase(){const list=$('answersList');list.innerHTML='';getPlayersArray().forEach(p=>{const c=document.createElement('div');c.className='answer-card';c.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${escapeHTML(p.answer||'—')}</p>`;list.appendChild(c)});$('goVoteBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromAnswersBtn').classList.toggle('hidden',!isHost());showScreen('answersScreen')}
    async function startVoting(){await update(ref(db,`lobbies/${currentLobbyCode}`),{phase:'voting',tiebreak:null})}
    function renderVotingPhase(){const grid=$('voteGrid'),me=getMyPlayer(),players=getPlayersArray(),already=Boolean(me?.vote);grid.innerHTML='';if(already)currentVoteSelection=parseVote(me.vote);function makeBtn(label,value,sub=''){const b=document.createElement('button');b.className='vote-btn';b.innerHTML=`<strong>${escapeHTML(label)}</strong>${sub?`<span style="display:block;margin-top:5px;font-size:12px;font-weight:500;color:var(--muted);line-height:1.35;">${escapeHTML(sub)}</span>`:''}`;const selected=currentVoteSelection.includes(value);if(selected){b.style.background='var(--bubble)';b.style.boxShadow='inset 0 0 0 2px rgba(42,171,238,.55)'}b.disabled=already;b.onclick=()=>toggleVoteSelection(value);return b}players.forEach(p=>{const b=makeBtn(p.name,p.id,p.answer||'—');if(p.id===currentPlayerId)b.disabled=true;grid.appendChild(b)});grid.appendChild(makeBtn(t('noImpostorOption'),NO_IMPOSTOR_VOTE,''));const submit=$('submitVotesBtn');submit.classList.toggle('hidden',already);submit.disabled=!currentVoteSelection.length;$('voteStatusText').textContent=already?`${t('voteSaved')} ${formatVoteSelection(parseVote(me.vote),players)}`:'';$('hostReturnLobbyFromVotingBtn').classList.toggle('hidden',!isHost());showScreen('voteScreen')}
    function toggleVoteSelection(value){if(getMyPlayer()?.vote)return;if(value===NO_IMPOSTOR_VOTE){currentVoteSelection=currentVoteSelection.includes(value)?[]:[value]}else{currentVoteSelection=currentVoteSelection.filter(v=>v!==NO_IMPOSTOR_VOTE);if(currentVoteSelection.includes(value))currentVoteSelection=currentVoteSelection.filter(v=>v!==value);else{if(currentVoteSelection.length>=2){alert(t('maxVotesAlert'));return}currentVoteSelection.push(value)}}renderVotingPhase()}
    async function submitVote(){if(getMyPlayer()?.vote){alert(t('alreadyVoted'));return}if(!currentVoteSelection.length){alert(t('selectVoteAlert'));return}await update(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),{vote:encodeVote(currentVoteSelection)});currentVoteSelection=[]}
    function getVoteSummary(lobby){const players=getPlayersArray(lobby),counts={};let noImpostorVotes=0;players.forEach(p=>parseVote(p.vote).forEach(v=>{if(v===NO_IMPOSTOR_VOTE)noImpostorVotes++;else counts[v]=(counts[v]||0)+1}));const ranked=Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]||playerNames([a[0]],players).localeCompare(playerNames([b[0]],players)));return{players,counts,noImpostorVotes,ranked,maxPlayerVotes:ranked[0]?.[1]||0}}
    function getVoteTargetSlots(lobby){const count=getImpostorIds(lobby).length;return count>0?count:1}
    function findTiebreakCandidate(lobby){const summary=getVoteSummary(lobby),impCount=getImpostorIds(lobby).length,target=getVoteTargetSlots(lobby),ranked=summary.ranked;if(!ranked.length||summary.maxPlayerVotes<=0)return null;if(impCount===0&&summary.noImpostorVotes>=summary.maxPlayerVotes)return null;if(impCount>0&&summary.noImpostorVotes>summary.maxPlayerVotes)return null;if(ranked.length<target)return null;const cutoff=ranked[target-1][1],greater=ranked.filter(([,c])=>c>cutoff),tied=ranked.filter(([,c])=>c===cutoff);if(tied.length===2&&greater.length<target&&greater.length+tied.length>target){return{players:tied.map(([id])=>id),votes:cutoff,targetSlots:target,createdAt:Date.now()}}return null}
    function getTiebreakPlayerIds(tb=currentLobbyData?.tiebreak){if(Array.isArray(tb?.players))return tb.players.filter(Boolean);if(tb?.players&&typeof tb.players==='object')return Object.values(tb.players).filter(Boolean);return[]}
    function getTiebreakChoices(tb=currentLobbyData?.tiebreak){return tb?.choices&&typeof tb.choices==='object'?tb.choices:{}}
    function rpsWinnerAndLoser(ids,choices){const [a,b]=ids,ca=choices[a],cb=choices[b];if(!ca||!cb||ca===cb)return null;if(RPS_BEATS[ca]===cb)return{winnerId:a,loserId:b};return{winnerId:b,loserId:a}}
    function buildPredictedIds(lobby,summary=getVoteSummary(lobby),tiebreakLoserId=null){const impostorIds=getImpostorIds(lobby),target=getVoteTargetSlots(lobby);if(impostorIds.length===0&&summary.noImpostorVotes>=summary.maxPlayerVotes)return[];if(impostorIds.length>0&&summary.noImpostorVotes>summary.maxPlayerVotes)return[];if(tiebreakLoserId){const loserVotes=summary.counts[tiebreakLoserId]||0;return[...summary.ranked.filter(([,c])=>c>loserVotes).map(([id])=>id),tiebreakLoserId].slice(0,target)}return summary.ranked.slice(0,target).map(([id])=>id)}
    async function maybeAutoAdvance(code,lobby){if(!isHost(lobby))return;const players=getPlayersArray(lobby);if(players.length<3)return;if(lobby.phase==='questions'&&players.every(p=>p.answer))await update(ref(db,`lobbies/${code}`),{phase:'answers'});if(lobby.phase==='voting'&&players.every(p=>parseVote(p.vote).length)){const tie=findTiebreakCandidate(lobby);if(tie){await update(ref(db,`lobbies/${code}`),{phase:'tiebreak',tiebreak:{...tie,choices:null,message:null}});return}const res=calculateResults(lobby);await update(ref(db,`lobbies/${code}`),{phase:'results',results:res,tiebreak:null});saveFinishedRound(lobby,res)}if(lobby.phase==='tiebreak'){const ids=getTiebreakPlayerIds(lobby.tiebreak),choices=getTiebreakChoices(lobby.tiebreak);if(ids.length===2&&ids.every(id=>choices[id])){const outcome=rpsWinnerAndLoser(ids,choices);if(!outcome){await update(ref(db,`lobbies/${code}/tiebreak`),{choices:null,message:'draw',roundStartedAt:Date.now()});return}const res=calculateResults(lobby,{tiebreakLoserId:outcome.loserId,tiebreakWinnerId:outcome.winnerId,tiebreakChoices:choices,tiebreakPlayerIds:ids});await update(ref(db,`lobbies/${code}`),{phase:'results',results:res});saveFinishedRound(lobby,res)}}}
    function calculateResults(lobby,opts={}){const summary=getVoteSummary(lobby),impostorIds=getImpostorIds(lobby),predictedIds=buildPredictedIds(lobby,summary,opts.tiebreakLoserId);const tiebreak=opts.tiebreakLoserId?{players:opts.tiebreakPlayerIds||getTiebreakPlayerIds(lobby.tiebreak),choices:opts.tiebreakChoices||getTiebreakChoices(lobby.tiebreak),winnerId:opts.tiebreakWinnerId,loserId:opts.tiebreakLoserId,votes:lobby.tiebreak?.votes||0}:null;return{voteCounts:summary.counts,noImpostorVotes:summary.noImpostorVotes,predictedIds,impostorIds,impostorCaught:sameSet(predictedIds,impostorIds),tiebreak}}
    function renderTiebreakPhase(){const tb=currentLobbyData?.tiebreak||{},ids=getTiebreakPlayerIds(tb),choices=getTiebreakChoices(tb),players=getPlayersArray(),names=playerNames(ids,players),meInTie=ids.includes(currentPlayerId),myChoice=choices[currentPlayerId];$('tiebreakText').textContent=t('tiebreakText')(names,tb.votes||0);$('tiebreakPlayersList').innerHTML=`<div class="answer-card"><strong>${escapeHTML(t('tiebreakPlayersLabel'))}</strong><p>${escapeHTML(names)}</p></div>`;const grid=$('rpsGrid');grid.innerHTML='';if(meInTie&&!myChoice){Object.entries(RPS_CHOICES).forEach(([choice,emoji])=>{const b=document.createElement('button');b.className='vote-btn rps-btn';b.innerHTML=rpsEmojiHTML(choice);b.setAttribute('aria-label',choice);b.onclick=()=>submitRpsChoice(choice);grid.appendChild(b)});$('tiebreakStatusText').textContent=tb.message==='draw'?`${t('tiebreakDraw')} ${t('tiebreakChooseText')}`:t('tiebreakChooseText')}else{grid.innerHTML='';$('tiebreakStatusText').textContent=meInTie?t('tiebreakWaitingInvolved'):(tb.message==='draw'?t('tiebreakDraw')+' '+t('tiebreakWaitingOthers'):t('tiebreakWaitingOthers'))}$('hostReturnLobbyFromTiebreakBtn').classList.toggle('hidden',!isHost());showScreen('tiebreakScreen')}
    async function submitRpsChoice(choice){if(!currentLobbyCode||!currentLobbyData?.tiebreak)return;if(!getTiebreakPlayerIds(currentLobbyData.tiebreak).includes(currentPlayerId))return;if(!RPS_CHOICES[choice])return;await update(ref(db,`lobbies/${currentLobbyCode}`),{[`tiebreak/choices/${currentPlayerId}`]:choice,'tiebreak/message':null})}
    function renderResultsPhase(){const l=currentLobbyData,res=l.results||calculateResults(l),players=getPlayersArray(l),impIds=res.impostorIds||getImpostorIds(l),imps=players.filter(p=>impIds.includes(p.id)),actualNames=playerNames(impIds,players),predictedNames=formatVoteSelection(res.predictedIds||[],players);$('resultEmoji').textContent=res.impostorCaught?'🎯':'😎';$('resultTitle').textContent=res.impostorCaught?t('foundTitle'):t('escapedTitle');$('resultText').textContent=res.impostorCaught?t('resultCorrectText')(actualNames):t('resultWrongText')(actualNames,predictedNames);const impostorAnswerHTML=imps.length?imps.map(imp=>`${escapeHTML(imp.name)} — ${escapeHTML(t('answerWord'))}: ${escapeHTML(imp.answer||'—')}`).join('<br>'):escapeHTML(t('noImpostorsLabel'));let tiebreakHTML='';if(res.tiebreak?.loserId){const tb=res.tiebreak,choiceText=(tb.players||[]).map(id=>`${escapeHTML(playerNames([id],players))}: ${rpsEmojiHTML(tb.choices?.[id])}`).join('<br>');tiebreakHTML=`<div class="answer-card"><strong>${escapeHTML(t('tiebreakTitle'))}</strong><p>${choiceText}<br>${escapeHTML(t('tiebreakWinnerLabel'))}: ${escapeHTML(playerNames([tb.winnerId],players))}<br>${escapeHTML(t('tiebreakLoserLabel'))}: ${escapeHTML(playerNames([tb.loserId],players))}</p></div>`}$('revealQuestions').innerHTML=`<div class="answer-card"><strong>${escapeHTML(t('topicLabel'))}</strong><p>${escapeHTML(l.topicLabel||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(t('regularQuestionLabel'))}</strong><p>${escapeHTML(l.regularQuestion||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(t('impostorQuestionLabel'))}</strong><p>${escapeHTML(l.impostorQuestion||'—')}</p></div><div class="answer-card"><strong>${escapeHTML(impIds.length===0?t('noImpostorsLabel'):(impIds.length===1?t('impostorLabel'):t('impostorsLabel')))}</strong><p>${impostorAnswerHTML}</p></div><div class="answer-card"><strong>${escapeHTML(t('suspectedLabel'))}</strong><p>${escapeHTML(predictedNames)}</p></div>${tie     function saveFinishedRound(lobby,res){if(history.some(x=>x.roundStartedAt===lobby.roundStartedAt))return;const ps=getPlayersArray(lobby),impIds=res.impostorIds||getImpostorIds(lobby),actualNames=playerNames(impIds,ps),predictedNames=formatVoteSelection(res.predictedIds||[],ps);history.push({date:new Date().toLocaleString([], {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),roundStartedAt:lobby.roundStartedAt,topicLabel:lobby.topicLabel,normalQuestion:lobby.regularQuestion,impostorQuestion:lobby.impostorQuestion,impostorName:actualNames,votedName:predictedNames,guessedCorrectly:res.impostorCaught});saveHistory();renderHistory()}
    async function rerollQuestions(){if(!currentLobbyCode||!isHost())return;const generated=generateUnusedQuestionPair(currentLobbyData),p=generated.pair;await update(ref(db,`lobbies/${currentLobbyCode}`),{topic:p.topic,topicLabel:p.topicLabel,regularQuestion:p.normal,impostorQuestion:p.impostor,usedQuestionKeys:generated.usedQuestionKeys})}function renderHistory(){const l=$('historyList');l.innerHTML='';if(!history.length){l.innerHTML=`<div class="history-card"><p>${escapeHTML(t('emptyHistory'))}</p></div>`;return}history.slice().reverse().forEach((r,i)=>{const c=document.createElement('div');c.className='history-card';c.innerHTML=`<strong>${escapeHTML(t('gameWord'))} ${history.length-i}</strong><div class="meta">${escapeHTML(r.date)} · ${escapeHTML(r.topicLabel||t('unknownTopic'))}</div><p><strong>${escapeHTML(t('regularQuestionLabel'))}:</strong> ${escapeHTML(r.normalQuestion)}</p><p><strong>${escapeHTML(t('impostorQuestionLabel'))}:</strong> ${escapeHTML(r.impostorQuestion)}</p><p><strong>${escapeHTML(t('impostorLabel'))}:</strong> ${escapeHTML(r.impostorName)}</p><p><strong>${escapeHTML(t('voteWord'))}:</strong> ${escapeHTML(r.votedName)} ${r.guessedCorrectly?'✅ '+escapeHTML(t('correctWord')):'❌ '+escapeHTML(t('wrongWord'))}</p>`;l.appendChild(c)})}function clearHistory(){if(confirm(t('clearHistoryConfirm'))){history=[];localStorage.removeItem('impostorGameHistory');renderHistory()}}
    function bind(id,event,fn){const el=$(id);if(el)el.addEventListener(event,fn);else console.warn('Missing element',id)}bind('createLobbyBtn','click',createLobby);bind('leaveLobbyBtn','click',leaveLobby);bind('joinLobbyBtn','click',joinLobby);bind('startBtn','click',startOnlineRound);bind('changeNameBtn','click',showNameModal);bind('saveNameBtn','click',saveName);bind('nameInput','keydown',e=>{if(e.key==='Enter')saveName()});bind('saveAnswerBtn','click',submitAnswer);bind('rerollQuestionsBtn','click',rerollQuestions);bind('goVoteBtn','click',startVoting);bind('submitVotesBtn','click',submitVote);bind('playAgainBtn','click',startOnlineRound);bind('backSetupBtn','click',()=>showScreen('setupScreen'));bind('clearHistoryBtn','click',clearHistory);bind('deleteLobbyBtn','click',deleteLobby);bind('closeStatusModalBtn','click',closeStatusModal);['hostReturnLobbyFromQuestionsBtn','hostReturnLobbyFromAnswersBtn','hostReturnLobbyFromVotingBtn','hostReturnLobbyFromTiebreakBtn','hostReturnLobbyFromResultsBtn'].forEach(id=>bind(id,'click',returnToLobby));document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>applyLanguage(btn.dataset.lang)));
