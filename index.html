    async function startOnlineRound(){if(!currentLobbyCode||!currentLobbyData)return;const players=getPlayersArray();if(players.length<3){alert(t('minPlayersAlert'));return}currentVoteSelection=[];const generated=generateUnusedQuestionPair(currentLobbyData),pair=generated.pair,impIds=chooseImpostorIds(players);const up={phase:'questions',language:currentLanguage,topic:pair.topic,topicLabel:pair.topicLabel,regularQuestion:pair.normal,impostorQuestion:pair.impostor,impostorId:impIds[0]||null,impostorIds:impIds,impostorCount:impIds.length,results:null,tiebreak:null,roundStartedAt:Date.now(),usedQuestionKeys:generated.usedQuestionKeys};players.forEach(p=>{up[`players/${p.id}/answer`]='';up[`players/${p.id}/vote`]=''});await update(ref(db,`lobbies/${currentLobbyCode}`),up)}function getMyQuestion(){return getImpostorIds().includes(currentPlayerId)?currentLobbyData.impostorQuestion:currentLobbyData.regularQuestion}function renderQuestionPhase(){const me=getMyPlayer();if(!me){showScreen('setupScreen');return}const players=getPlayersArray(),othersStillAnswering=players.some(p=>p.id!==currentPlayerId&&!p.answer),input=$('answerInput'),isTyping=document.activeElement===input&&!me.answer;if(!isTyping){input.value=me.answer||''}input.disabled=Boolean(me.answer);$('questionPlayerName').textContent=me.name;$('questionText').textContent=getMyQuestion();$('saveAnswerBtn').disabled=Boolean(me.answer);$('answerStatusText').textContent=me.answer?(othersStillAnswering?t('answerSaved'):''):t('waitingAnswers');$('rerollQuestionsBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromQuestionsBtn').classList.toggle('hidden',!isHost());showScreen('questionScreen')}async function submitAnswer(){const ans=$('answerInput').value.trim();if(!ans){alert(t('emptyAnswerAlert'));return}const players=getPlayersArray(),othersStillAnswering=players.some(p=>p.id!==currentPlayerId&&!p.answer);await update(ref(db,`lobbies/${currentLobbyCode}/players/${currentPlayerId}`),{answer:ans});if(othersSti     function renderAnswersPhase(){const list=$('answersList');list.innerHTML='';getPlayersArray().forEach(p=>{const c=document.createElement('div');c.className='answer-card';c.innerHTML=`<strong>${escapeHTML(p.name)}</strong><p>${escapeHTML(p.answer||'—')}</p>`;list.appendChild(c)});$('goVoteBtn').classList.toggle('hidden',!isHost());$('hostReturnLobbyFromAnswersBtn').classList.toggle('hidden',!isHost());showScreen('answersScreen')}

    function renderVotingPhase(){const grid=$('voteGrid'),me=getMyPlayer(),players=getPlayersArray(),already=Boolean(me?.vote);grid.innerHTML='';if(already)currentVoteSelection=parseVote(me.vote);function makeBtn(label,value,sub=''){const b=document.createElement('button');b.className='vote-btn';b.innerHTML=`<strong>${escapeHTML(label)}</strong>${sub?`<span style="display:block;margin-top:5px;font-size:12px;font-weight:500;color:var(--muted);line-height:1.35;">${escapeHTML(sub)}</span>`:''}`;const selected=currentVoteSelection.includes(value);if(selected){b.style.background='var(--bubble)';b.style.boxShadow='inset 0 0 0 2px rgba(42,171,238,.55)'}b.disabled=already;b.onclick=()=>toggleVoteSelection(value);return b}players.forEach(p=>{const b=makeBtn(p.name,p.id,p.answer||'—');if(p.id===currentPlayerId)b.disabled=true;grid.appendChild(b)});const noBtn=makeBtn(t('noImpostorOption'),NO_IMPOSTOR_VOTE,'');if(currentVoteSelection.some(v=>v!==NO_IMPOSTOR_VOTE)&&!already){noBtn.disabled=true;noBtn.style.opacity='.45';noBtn.title=t('noImpostorExclusiveAlert')}grid.appendChild(noBtn);const submit=$('submitVotesBtn');submit.classList.toggle('hidden',already);submit.disabled=!currentVoteSelection.length;const waitingPlayers=players.filter(p=>!parseVote(p.vote).length).map(p=>p.name);

    function getVoteSummary(lobby){const players=getPlayersArray(lobby),counts={};let noImpostorVotes=0;players.forEach(p=>parseVote(p.vote).forEach(v=>{if(v===NO_IMPOSTOR_VOTE)noImpostorVotes++;else counts[v]=(counts[v]||0)+1}));const ranked=Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]||playerNames([a[0]],players).localeCompare(playerNames([b[0]],players)));return{players,counts,noImpostorVotes,ranked,maxPlayerVotes:ranked[0]?.[1]||0}}

    async function maybeAutoAdvance(code,lobby){if(!isHost(lobby))return;const players=getPlayersArray(lobby);if(players.length<3)return;if(lobby.phase==='questions'&&players.every(p=>p.answer))await update(ref(db,`lobbies/${code}`),{phase:'answers'});if(lobby.phase==='voting'&&players.every(p=>parseVote(p.vote).length)){const tie=findTiebreakCandidate(lobby);if(tie){await update(ref(db,`lobbies/${code}`),{phase:'tiebreak',tiebreak:{...tie,choices:null,message:null}});return}const res=calculateResults(lobby);await update(ref(db,`lobbies/${code}`),{phase:'results',results:res,tiebreak:null});await saveFinishedRound(lobby,res)}if(lobby.phase==='tiebreak'){const ids=getTiebreakPlayerIds(lobby.tiebreak),choices=getTiebreakChoices(lobby.tiebreak);if(ids.length===2&&ids.every(id=>choices[id])){const outcome=rpsWinnerAndLoser(ids,choices);if(!outcome){await update(ref(db,`lobbies/${code}/tiebreak`),{choices:null,message:'draw',roundStartedAt:Date.now()});return}const res=calculateResults(lobby,{tiebreakLoserId:outcome.loserId,tiebreakWinnerId:outcome.winnerId,tiebreakChoices:choices,tiebreakPlayerIds:ids});await update(ref(db,`lobbies/${code}`),{phase:'results',results:res});await saveFinishedRound(lobby,res)}}}
