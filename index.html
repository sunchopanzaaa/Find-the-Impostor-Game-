    async function saveFinishedRound(lobby,res){const existing=Array.isArray(lobby.sharedHistory)?lobby.sharedHistory:[];if(existing.some(x=>x.roundStartedAt===lobby.roundStartedAt))return;const ps=getPlayersArray(lobby),impIds=res.impostorIds||getImpostorIds(lobby),actualNames=playerNames(impIds,ps),predictedNames=formatVoteSelection(res.predictedIds||[],ps);const item={date:new Date().toLocaleString([], {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),roundStartedAt:lobby.roundStartedAt||Date.now(),topicLabel:lobby.topicLabel,normalQuestion:lobby.regularQuestion,impostorQuestion:lobby.impostorQuestion,impostorName:actualNames,votedName:predictedNames,guessedCorrectly:res.impostorCaught};const next=[...existing,item].slice(-30);try{await update(ref(db,`lobbies/${currentLobbyCode}`),{sharedHistory:next})}catch(e){console.warn('Shared history save failed:',e);if(!history.some(x=>x.roundStartedAt===item.roundStartedAt)){history.push(item);saveHistory();renderHistory()}}}
    async function rerollQuestions(){if(!currentLobbyCode||!isHost())return;const generated=generateUnusedQuestionPair(currentLobbyData),p=generated.pair;await update(ref(db,`lobbies/${currentLobbyCode}`),{topic:p.topic,topicLabel:p.topicLabel,regularQuestion:p.normal,impostorQuestion:p.impostor,usedQuestionKeys:generated.usedQuestionKeys})}function renderHistory(){const l=$('historyList');l.innerHTML='';const lobbyHistory=Array.isArray(currentLobbyData?.sharedHistory)?currentLobbyData.sharedHistory:null;const list=lobbyHistory||history;if(!list.length){l.innerHTML=`<div class="history-card"><p>${escapeHTML(t('emptyHistory'))}</p></div>`;return}list.slice().reverse().forEach((r,i)=>{const c=document.createElement('div');c.className='history-card';c.innerHTML=`<strong>${escapeHTML(t('gameWord'))} ${list.length-i}</strong><div class="meta">${escapeHTML(r.date)} · ${escapeHTML(r.topicLabel||t('unknownTopic'))}</div><p><strong>${escapeHTML(t('regularQuestionLabel'))}:</strong> ${escapeHTML(r.normalQuestion)}</p><p><strong>${escapeHTML(t('impostorQuestionLabel'))}:</strong> ${escapeHTML(r.impostorQuestion)}</p><p><strong>${escapeHTML(r.impostorName)}</strong> ${/[а-яіїєґ]a$/i.test(r.impostorName)||/[ая]$/i.test(r.impostorName)?'була імпостором':'був імпостором'}</p><p><strong>${escapeHTML(t('voteWord'))}:</strong> ${escapeHTML(r.votedName)} ${r.guessedCorrectly?'✅ '+escapeHTML(t('correctWord')):'❌ '+escapeHTML(t('wrongWord'))}</p>`;l.appendChild(c)})}function clearHistory(){if(confirm(t('clearHistoryConfirm'))){if(currentLobbyCode&&currentLobbyData){update(ref(db,`lobbies/${currentLobbyCode}`),{sharedHistory:[]}).catch(console.warn)}history=[];localStorage.removeItem('impostorGameHistory');renderHistory()}}
    function bind(id,event,fn){const el=$(id);if(el)el.addEventListener(event,fn);else console.warn('Missing element',id)}bind('createLobbyBtn','click',createLobby);bind('leaveLobbyBtn','click',leaveLobby);bind('joinLobbyBtn','click',joinLobby);bind('startBtn','click',startOnlineRound);bind('changeNameBtn','click',showNameModal);bind('saveNameBtn','click',saveName);bind('nameInput','keydown',e=>{if(e.key==='Enter')saveName()});bind('saveAnswerBtn','click',submitAnswer);bind('answerInput','input',()=>{const me=getMyPlayer();if(me&&!String(me.answer||''))$('saveAnswerBtn').disabled=!$('answerInput').value.trim()});bind('rerollQuestionsBtn','click',rerollQuestions);bind('goVoteBtn','click',startVoting);bind('submitVotesBtn','click',submitVote);bind('playAgainBtn','click',startOnlineRound);bind('backSetupBtn','click',()=>showScreen('setupScreen'));bind('clearHistoryBtn','click',clearHistory);bind('deleteLobbyBtn','click',deleteLobby);bind('closeStatusModalBtn','click',closeStatusModal);['hostReturnLobbyFromQuestionsBtn','hostReturnLobbyFromAnswersBtn','hostReturnLobbyFromVotingBtn','hostReturnLobbyFromTiebreakBtn','hostReturnLobbyFromResultsBtn'].forEach(id=>bind(id,'click',returnToLobby));document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>applyLanguage(btn.dataset.lang)));
    applyLanguage(currentLanguage);renderMyName();renderHistory();if(!myPlayerName)showNameModal();if(currentLobbyCode)listenToLobby(currentLobbyCode);console.log('Find the Impostor loaded');
